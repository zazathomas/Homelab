---
apiVersion: v1
kind: Service
metadata:
  name: seerr
  namespace: external-services
spec:
  ports:
  - name: http
    port: 5055
    protocol: TCP
    targetPort: 5055
  type: ClusterIP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: seerr
  namespace: external-services
  labels:
    kubernetes.io/service-name: seerr
addressType: IPv4
endpoints:
  - addresses:
      - 192.168.0.7
ports:
  - name: http
    port: 5055
    protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seerr-ext-route
  namespace: external-services
  annotations:
    external-dns.alpha.kubernetes.io/controller: "ignore"
spec:
  parentRefs:
  - name: envoy-gw
    namespace: gateway
    group: gateway.networking.k8s.io	
    kind: Gateway
  hostnames:
  - "seerr.z3cyber.tech"
  rules:
   - backendRefs:
      - name: seerr
        port: 5055
        group: ''	
        kind: Service
        weight: 1	
     matches:	
        - path:	
            type: PathPrefix	
            value: /
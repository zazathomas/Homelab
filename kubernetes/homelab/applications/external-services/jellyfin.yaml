---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: external-services
spec:
  ports:
  - name: http
    port: 8096
    protocol: TCP
    targetPort: 8096
  type: ClusterIP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: jellyfin
  namespace: external-services
  labels:
    kubernetes.io/service-name: jellyfin
addressType: IPv4
endpoints:
  - addresses:
      - 192.168.0.7
ports:
  - name: http
    port: 8096
    protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jellyfin-ext-route
  namespace: external-services
  annotations:
    external-dns.alpha.kubernetes.io/controller: "ignore"
spec:
  parentRefs:
  - name: envoy-gw
    namespace: gateway
    group: gateway.networking.k8s.io	
    kind: Gateway
  hostnames:
  - "jellyfin.z3cyber.tech"
  rules:
   - backendRefs:
      # - name: jellyfin
      #   port: 8096
      #   group: ''	
      #   kind: Service
      #   weight: 1	
      - name: jellyfin
        port: 8096
        group: gateway.envoyproxy.io
        kind: Service
        weight: 1	
     matches:	
        - path:	
            type: PathPrefix	
            value: /

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: jellyfin
  namespace: external-services
spec:
  appProtocols: 
    - gateway.envoyproxy.io/h2c
  endpoints:
    - unix:
        path: /var/run/backend.sock   
    - ip:
        address: 192.168.0.7
        port: 8096
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - runtime-class.yaml

helmCharts:
- name: nvidia-device-plugin
  namespace: kube-system
  repo: https://nvidia.github.io/k8s-device-plugin
  version: 0.19.0
  releaseName: nvidia-device-plugin
  valuesFile: values.yaml


# Satisfy the GPU presence requirement
# kubectl label node talos-worker-2 nvidia.com/gpu.present=true --overwrite
# kubectl label node talos-worker-2 nvidia.com/mps.capable=true --overwrite
# https://oneuptime.com/blog/post/2026-03-03-install-nvidia-gpu-drivers-on-talos-linux/view
apiVersion: batch/v1
kind: CronJob
metadata:
  name: geoip-db-updater
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: db-updater
              image: curlimages/curl:8.18.0
              command: ["/bin/sh", "-c"]
              args:
                - |
                  echo "Updating GeoIP DB on shared PVC..."
                  curl -f -L -u ${maxmind_account_id}:${maxmind_license_key} \
                    'https://download.maxmind.com/geoip/databases/GeoLite2-Country/download?suffix=tar.gz' \
                    -o /tmp/db.tar.gz
                  tar -xzf /tmp/db.tar.gz -C /geoip_db --strip-components=1
                  echo "Update complete."
              volumeMounts:
                - name: geoip-db
                  mountPath: /geoip_db
              envFrom:
                - secretRef:
                    name: envoy-kubewaf
          restartPolicy: OnFailure
          volumes:
            - name: geoip-db
              persistentVolumeClaim:
                claimName: geoip-db-pvc
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: kubewaf-policy
  namespace: gateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-gw
  extAuth:
    http:
      path: "/authz"
      backendRefs:
        - name: envoy-kubewaf
          namespace: gateway
          port: 9099
      backendSettings:
        healthCheck:
          http:

    headersToExtAuth: ["x-envoy-external-address", "user-agent", "host", "path"]
    bodyToExtAuth:
          maxRequestBytes: 32768